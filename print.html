<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tiler — Cut Sheet</title>
  <style>
    :root {
      --ink:#23201b; --ink-soft:#6b6357; --line:#ded7c9; --surface-2:#faf8f3;
      --accent:#b5502e; --mono: ui-monospace,"SF Mono",Menlo,Consolas,monospace;
      --sans: ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    }
    * { box-sizing: border-box; }
    body { margin:0; font-family:var(--sans); color:var(--ink); background:#fff; }
    .wrap { max-width: 1000px; margin: 0 auto; padding: 28px 22px 60px; }

    .toolbar { display:flex; gap:10px; align-items:center; margin-bottom:18px; }
    .toolbar button, .toolbar a {
      font:inherit; font-size:.82rem; font-weight:600; text-decoration:none;
      padding:8px 14px; border-radius:8px; cursor:pointer;
      border:1px solid var(--line); background:var(--surface-2); color:var(--ink);
    }
    .toolbar .primary { background:var(--accent); border-color:var(--accent); color:#fff; }

    h1 { font-size:1.4rem; margin:0 0 2px; letter-spacing:-.01em; }
    .sub { color:var(--ink-soft); font-size:.82rem; margin:0 0 20px; }
    h2 { font-size:.72rem; text-transform:uppercase; letter-spacing:.08em; color:var(--ink-soft);
         border-bottom:1px solid var(--line); padding-bottom:6px; margin:26px 0 12px; }

    .specs { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:8px 20px; }
    .spec { font-size:.82rem; display:flex; justify-content:space-between; gap:10px;
            border-bottom:1px dotted var(--line); padding:3px 0; }
    .spec .k { color:var(--ink-soft); }
    .spec .v { font-family:var(--mono); font-weight:600; }

    .totals { display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:10px; margin-top:4px; }
    .tot { border:1px solid var(--line); border-radius:8px; padding:10px 12px; }
    .tot .k { font-size:.64rem; text-transform:uppercase; letter-spacing:.06em; color:var(--ink-soft); font-weight:700; }
    .tot .v { font-family:var(--mono); font-size:1.15rem; font-weight:600; margin-top:2px; }
    .tot.big { background:var(--accent); border-color:var(--accent); }
    .tot.big .k { color:rgba(255,255,255,.8); } .tot.big .v { color:#fff; font-size:1.35rem; }

    #plan { width:100%; height:auto; border:1px solid var(--line); border-radius:8px; background:#fff; }

    .stocks { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:14px; }
    .card { border:1px solid var(--line); border-radius:8px; padding:10px; break-inside:avoid; }
    .card canvas { width:100%; height:auto; background:var(--surface-2); border:1px solid var(--line); border-radius:6px; }
    .card h3 { font-size:.82rem; margin:8px 0 6px; }
    .card ul { list-style:none; margin:0; padding:0; }
    .card li { display:flex; justify-content:space-between; gap:8px; font-size:.74rem; padding:2px 0; }
    .card .n { font-family:var(--mono); color:var(--accent); font-weight:600; }
    .card .s { font-family:var(--mono); }

    .err { color:var(--accent); font-size:.95rem; padding:20px; }

    @media print {
      .toolbar { display:none; }
      .wrap { max-width:none; padding:0; }
      h2 { page-break-after:avoid; }
      .card { border-color:#ccc; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="toolbar">
      <button type="button" class="primary" onclick="window.print()">Print / Save PDF</button>
      <a id="editLink" href="index.html">← Back to planner</a>
    </div>
    <div id="report"></div>
  </div>
  <script src="core.js"></script>
  <script src="print.js"></script>
</body>
</html>
